name: Frontend CI/CD

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: frontend-cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/overl1te/ecodesman-web
  NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL || '/api/v1' }}
  NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://example.com' }}

jobs:
  checks:
    name: Lint and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Build Next.js
        run: npm run build

  container:
    name: Build and smoke-run image
    runs-on: ubuntu-latest
    needs: checks
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL="$NEXT_PUBLIC_API_BASE_URL" \
            --build-arg NEXT_PUBLIC_SITE_URL="$NEXT_PUBLIC_SITE_URL" \
            --tag "$IMAGE_NAME:${GITHUB_SHA}" \
            --tag "$IMAGE_NAME:latest" \
            .

      - name: Run image checks
        run: |
          set -euo pipefail
          container_id=""
          cleanup() {
            if [ -n "$container_id" ]; then
              docker logs "$container_id" || true
              docker rm -f "$container_id" || true
            fi
          }
          trap cleanup EXIT

          container_id=$(docker run -d -p 3000:3000 "$IMAGE_NAME:${GITHUB_SHA}")
          healthy=0
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              healthy=1
              break
            fi
            sleep 1
          done

          test "$healthy" = "1"
          docker logs "$container_id"
          docker rm -f "$container_id"
          container_id=""

      - name: Push image
        run: |
          docker push "$IMAGE_NAME:${GITHUB_SHA}"
          docker push "$IMAGE_NAME:latest"

  deploy:
    name: Deploy frontend to VPS
    runs-on: ubuntu-latest
    needs: container
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          FRONTEND_IMAGE: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          envs: FRONTEND_IMAGE,GHCR_USER,GHCR_TOKEN,VPS_DEPLOY_PATH
          script: |
            set -euo pipefail
            cd "$VPS_DEPLOY_PATH"
            mkdir -p .deploy
            (
              flock -w 300 9
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

              touch .env
              set_env() {
                key="$1"
                value="$2"
                if grep -q "^${key}=" .env; then
                  sed -i "s|^${key}=.*|${key}=${value}|" .env
                else
                  printf '%s=%s\n' "$key" "$value" >> .env
                fi
              }

              set_env FRONTEND_IMAGE "$FRONTEND_IMAGE"
              docker compose config >/dev/null
              docker compose pull frontend
              docker compose up -d --no-deps frontend

              for _ in $(seq 1 60); do
                if curl -fsS http://127.0.0.1/ >/dev/null; then
                  break
                fi
                sleep 2
              done

              curl -fsS http://127.0.0.1/ >/dev/null
              docker compose ps frontend proxy
              docker image prune -af
            ) 9>.deploy/deploy.lock
